<!-- 
  @file public/profile.html
  @description User profile management page.
  
  Features:
  - Display and update personal information
  - Password change functionality
  - Role-specific profile views
-->
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <title>Mon Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border-color: #e2e8f0;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            /* Changed from center to allow scrolling */
            min-height: 100vh;
            margin: 0;
            padding: 2rem 1rem;
            /* Added padding for scrolling */
        }

        .container {
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: var(--text-dark);
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        button:hover {
            opacity: 0.9;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: var(--text-light);
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        .message {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border-radius: 6px;
            display: none;
        }

        .error {
            background: #fef2f2;
            color: var(--error-color);
            border: 1px solid #fee2e2;
        }

        .success {
            background: #ecfdf5;
            color: var(--success-color);
            border: 1px solid #d1fae5;
        }

        /* Profile Picture Styles */
        .profile-pic-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            cursor: pointer;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--white);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            background: #f1f5f9;
        }

        .profile-pic-overlay {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--primary-color);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 2px solid var(--white);
        }

        #fileInput {
            display: none;
        }

        /* Professional Docs Styles */
        .professional-docs {
            margin-top: 1.5rem;
            display: none;
            padding: 1.5rem;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .doc-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: white;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border-color);
        }

        .doc-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .doc-icon {
            font-size: 1.2rem;
        }

        .doc-name {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .doc-status {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }

        .status-uploaded {
            background: #dcfce7;
            color: #166534;
        }

        .status-empty {
            background: #f1f5f9;
            color: #64748b;
        }

        .btn-upload-doc {
            background: var(--white);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            width: auto;
            margin: 0;
            transition: all 0.2s;
        }

        .btn-upload-doc:hover {
            background: var(--primary-color);
            color: white;
        }

        /* Listing Styles */
        .listing-section {
            margin-top: 1.5rem;
            display: none;
            padding: 1.5rem;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
        }

        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
            <button class="lang-btn" id="langSwitcher" onclick="toggleLanguage()"
                style="width: auto; padding: 0.4rem 0.8rem; border: 1px solid var(--border-color); background: white; cursor: pointer; font-size: 0.8rem; border-radius: 4px; font-weight: 600; color: var(--text-dark); margin: 0;">FR</button>
        </div>
        <h2 data-i18n="profile.title">Modifier mon profil</h2>
        <div id="messageBox" class="message"></div>

        <div class="profile-pic-container" onclick="document.getElementById('fileInput').click()">
            <img id="profilePreview" src="" alt="Profile" class="profile-pic">
            <div class="profile-pic-overlay">📷</div>
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
        </div>

        <form id="profileForm" onsubmit="handleUpdate(event)">
            <h3 data-i18n="profile.doctor_section"
                style="font-size: 1rem; margin-bottom: 1rem; color: var(--text-dark); border-bottom: 2px solid var(--primary-color); display: inline-block; padding-bottom: 0.2rem;">
                Informations Personnelles</h3>

            <div class="form-group">
                <label data-i18n="profile.firstname">Prénom</label>
                <input type="text" id="firstName">
            </div>
            <div class="form-group">
                <label data-i18n="profile.lastname">Nom</label>
                <input type="text" id="lastName">
            </div>
            <div class="form-group">
                <label data-i18n="profile.email">Email</label>
                <input type="email" id="email" disabled style="background: #f1f5f9;">
            </div>
            <div class="form-group">
                <label data-i18n="profile.phone">Numéro de téléphone</label>
                <input type="tel" id="phone" placeholder="+33 6 12 34 56 78">
            </div>

            <!-- Doctor-Specific Professional Sections -->
            <div id="doctorOnlySection" style="display: none;">
                <h3 data-i18n="profile.doctor_section"
                    style="font-size: 1rem; margin: 1.5rem 0 1rem; color: var(--text-dark); border-bottom: 2px solid var(--primary-color); display: inline-block; padding-bottom: 0.2rem;">
                    Annonce Professionnelle (Post)</h3>

                <div class="listing-section" style="display: block; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label data-i18n="profile.specialty">Spécialité</label>
                        <input type="text" id="specialty" data-i18n="profile.specialty"
                            placeholder="ex: Psychologue Clinicien, Thérapeute...">
                    </div>

                    <div class="form-group">
                        <label data-i18n="profile.bio">Bio Professionnelle</label>
                        <textarea id="bio" data-i18n="profile.bio"
                            placeholder="Décrivez votre parcours, vos méthodes..."></textarea>
                    </div>

                        <div class="file-input-group">
                            <label data-i18n="profile.certification">Certification / Diplôme (PDF)</label>
                            <input type="file" accept=".pdf" onchange="handleDocUpload(event, 'certification')">
                            <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                                <span id="certStatus" class="doc-status status-empty">Non téléchargé</span>
                                <button type="button" id="viewCertBtn" onclick="viewCurrentDoc('certification')" style="display: none; background: none; border: none; color: var(--primary-color); cursor: pointer; font-size: 0.85rem; text-decoration: underline;">Voir</button>
                            </div>
                        </div>
                        <div class="file-input-group">
                            <label data-i18n="profile.cv">Curriculum Vitae (CV) (PDF)</label>
                            <input type="file" accept=".pdf" onchange="handleDocUpload(event, 'cv')">
                            <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                                <span id="cvStatus" class="doc-status status-empty">Non téléchargé</span>
                                <button type="button" id="viewCvBtn" onclick="viewCurrentDoc('cv')" style="display: none; background: none; border: none; color: var(--primary-color); cursor: pointer; font-size: 0.85rem; text-decoration: underline;">Voir</button>
                            </div>
                        </div>

                    <div class="form-group">
                        <label data-i18n="profile.availability">Disponibilités</label>
                        <input type="text" id="availability" data-i18n="profile.availability"
                            placeholder="ex: Lun-Ven 09h-18h">
                    </div>

                    <div class="form-group">
                        <label data-i18n="profile.location">Lieu du Cabinet (si présentiel)</label>
                        <input type="text" id="location" data-i18n="profile.location"
                            placeholder="ex: 123 Rue de la Paix, Casablanca">
                    </div>

                    <div class="form-group">
                        <label data-i18n="profile.consultation_mode">Mode de Consultation</label>
                        <select id="consultationMode">
                            <option value="online" data-i18n="profile.mode_online">En ligne uniquement</option>
                            <option value="presence" data-i18n="profile.mode_office">En cabinet uniquement</option>
                            <option value="both" data-i18n="profile.mode_both">Les deux (En ligne & Présentiel)</option>
                        </select>
                    </div>
                </div>


            </div>
            <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid var(--border-color);">
            <div class="form-group">
                <label data-i18n="profile.current_password">Mot de passe actuel (requis pour changer)</label>
                <input type="password" id="currentPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label data-i18n="profile.new_password">Nouveau mot de passe</label>
                <input type="password" id="newPassword" placeholder="••••••••">
            </div>
            <button type="submit" data-i18n="profile.submit">Enregistrer les modifications</button>
        </form>
        <a href="#" onclick="goBack()" class="back-link" data-i18n="profile.back">Retour au tableau de bord</a>
    </div>

    <script src="js/notifications.js"></script>
    <script src="js/i18n.js"></script>
    <script>
        const API_URL = '/api';
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) window.location.href = 'login.html';

        // Load initial data
        document.getElementById('firstName').value = user.firstName || '';
        document.getElementById('lastName').value = user.lastName || '';
        document.getElementById('email').value = user.email || '';
        document.getElementById('phone').value = user.phone || '';

        const previewEl = document.getElementById('profilePreview');
        if (user.profilePicture) {
            previewEl.src = user.profilePicture;
        } else {
            previewEl.src = `https://ui-avatars.com/api/?name=${user.firstName}+${user.lastName}&background=6366f1&color=fff&size=128`;
        }

        // Professional sections logic
        if (user.role === 'doctor') {
            document.getElementById('doctorOnlySection').style.display = 'block';

            if (user.certification) {
                document.getElementById('certStatus').textContent = 'Téléchargé';
                document.getElementById('certStatus').className = 'doc-status status-uploaded';
                document.getElementById('viewCertBtn').style.display = 'inline';
            }
            if (user.cv) {
                document.getElementById('cvStatus').textContent = 'Téléchargé';
                document.getElementById('cvStatus').className = 'doc-status status-uploaded';
                document.getElementById('viewCvBtn').style.display = 'inline';
            }

            // Load listing data
            document.getElementById('specialty').value = user.specialty || '';
            document.getElementById('bio').value = user.bio || '';
            document.getElementById('availability').value = user.availability || '';
            document.getElementById('location').value = user.location || '';
            document.getElementById('consultationMode').value = user.consultationMode || 'online';
        }

        let base64Image = null;
        let base64Cert = null;
        let base64Cv = null;

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('profilePreview').src = e.target.result;
                    base64Image = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function handleDocUpload(event, type) {
            const file = event.target.files[0];
            if (file) {
                // Check file size (optional but good for UX)
                if (file.size > 50 * 1024 * 1024) {
                    showNotification("Le fichier est trop volumineux (max 50MB)", "error");
                    event.target.value = '';
                    return;
                }

                const statusEl = document.getElementById(type === 'certification' ? 'certStatus' : 'cvStatus');
                const viewBtn = document.getElementById(type === 'certification' ? 'viewCertBtn' : 'viewCvBtn');
                
                statusEl.textContent = 'Chargement...';
                
                const reader = new FileReader();
                reader.onload = function (e) {
                    if (type === 'certification') {
                        base64Cert = e.target.result;
                    } else {
                        base64Cv = e.target.result;
                    }
                    statusEl.textContent = 'Prêt à enregistrer';
                    statusEl.className = 'doc-status status-uploaded';
                    viewBtn.style.display = 'inline';
                    // Update the view function to use the new local data
                    viewBtn.onclick = () => {
                        const win = window.open();
                        win.document.write('<iframe src="' + e.target.result + '" frameborder="0" style="border:0; top:0px; left:0px; bottom:0px; right:0px; width:100%; height:100%;" allowfullscreen></iframe>');
                    };
                };
                reader.onerror = () => {
                    statusEl.textContent = 'Erreur de lecture';
                    statusEl.className = 'doc-status status-empty';
                };
                reader.readAsDataURL(file);
            }
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        async function handleUpdate(e) {
            e.preventDefault();
            const messageBox = document.getElementById('messageBox');
            messageBox.style.display = 'none';

            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const phone = document.getElementById('phone').value;
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;

            const payload = { firstName, lastName, phone };
            if (base64Image) payload.profilePicture = base64Image;
            if (base64Cert) payload.certification = base64Cert;
            if (base64Cv) payload.cv = base64Cv;

            if (user.role === 'doctor') {
                payload.specialty = document.getElementById('specialty').value;
                payload.bio = document.getElementById('bio').value;
                payload.availability = document.getElementById('availability').value;
                payload.location = document.getElementById('location').value;
                payload.consultationMode = document.getElementById('consultationMode').value;
            }

            if (newPassword) {
                if (!currentPassword) {
                    showMessage(getNestedTranslation(currentLang, 'profile.auth_error'), 'error');
                    return;
                }
                payload.currentPassword = currentPassword;
                payload.newPassword = newPassword;
            }

            try {
                // Show loading state
                const submitBtn = e.target.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                submitBtn.disabled = true;
                submitBtn.textContent = 'Enregistrement...';

                const response = await fetch(`${API_URL}/user/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {
                    showNotification(getNestedTranslation(currentLang, 'profile.success'), 'success');
                    const updatedUser = { ...user, ...data.user };
                    localStorage.setItem('user', JSON.stringify(updatedUser));
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                } else {
                    let errMsg = data.message || getNestedTranslation(currentLang, 'profile.error');
                    if (response.status === 413) {
                        errMsg = "Le fichier est trop volumineux pour le serveur. Veuillez utiliser un fichier plus petit ou contacter le support.";
                    }
                    showNotification(errMsg, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification(getNestedTranslation(currentLang, 'profile.error'), 'error');
            } finally {
                const submitBtn = e.target.querySelector('button[type="submit"]');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enregistrer les modifications';
            }
        }

        function viewCurrentDoc(type) {
            const data = type === 'certification' ? user.certification : user.cv;
            if (!data) return;
            const win = window.open();
            win.document.write('<iframe src="' + data + '" frameborder="0" style="border:0; top:0px; left:0px; bottom:0px; right:0px; width:100%; height:100%;" allowfullscreen></iframe>');
        }

        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.textContent = text;
            box.className = `message ${type}`;
            box.style.display = 'block';
        }
    </script>
</body>

</html>
