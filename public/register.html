<!-- 
  @file public/register.html
  @description User registration page for طمئن.
  
  Features:
  - Account creation for Patients
  - Multi-language support (i18n)
  - Form validation for personal information
-->
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <meta name="description" content="Inscription - Créez votre compte">
    <title>Inscription</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --secondary-color: #8b5cf6;
            --accent-color: #ec4899;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            line-height: 1.6;
            background: var(--bg-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 2rem 0;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: var(--gradient-1);
            opacity: 0.1;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -50%;
            right: -20%;
            width: 500px;
            height: 500px;
            background: var(--gradient-2);
            opacity: 0.1;
            border-radius: 50%;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-30px);
            }
        }

        .register-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            padding: 2rem;
        }

        .register-card {
            background: var(--white);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            display: none;
        }

        .logo img {
            height: 80px;
            width: auto;
            display: block;
            margin: 0 auto 1rem;
        }

        .logo p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-header h2 {
            font-size: 1.8rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: var(--white);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-group input::placeholder {
            color: #cbd5e1;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-light);
            font-size: 1.2rem;
            user-select: none;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-weak {
            width: 33%;
            background: var(--error-color);
        }

        .strength-medium {
            width: 66%;
            background: #f59e0b;
        }

        .strength-strong {
            width: 100%;
            background: var(--success-color);
        }

        .password-hint {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 0.5rem;
        }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .terms-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 0.2rem;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .terms-checkbox label {
            color: var(--text-dark);
            font-size: 0.9rem;
            cursor: pointer;
            margin: 0;
        }

        .terms-checkbox label a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .terms-checkbox label a:hover {
            text-decoration: underline;
        }

        .btn-register {
            width: 100%;
            padding: 1rem;
            background: var(--gradient-1);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 102, 241, 0.3);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .divider span {
            padding: 0 1rem;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .social-btn {
            padding: 0.9rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: var(--white);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .social-btn:hover {
            border-color: var(--primary-color);
            background: rgba(99, 102, 241, 0.05);
            transform: translateY(-2px);
        }

        .login-link {
            text-align: center;
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: var(--primary-dark);
        }

        .back-home {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-home a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-home a:hover {
            color: var(--primary-color);
        }

        @media (max-width: 768px) {
            .register-container {
                padding: 1rem;
            }

            .register-card {
                padding: 2rem 1.5rem;
            }

            .logo h1 {
                font-size: 2rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .social-login {
                grid-template-columns: 1fr;
            }
                /* Verification Section Removed */    }
    </style>
    <script src="js/i18n.js"></script>
    <script src="js/notifications.js"></script>
</head>

<body>
    <div class="register-container">
        <div class="register-card">
            <div style="margin-bottom: 2rem; text-align: center;">
                <button class="lang-btn" id="langSwitcher" onclick="toggleLanguage()"
                    style="border: 1px solid var(--border-color); background: white; cursor: pointer; font-size: 0.9rem; padding: 0.4rem 0.8rem; border-radius: 4px; font-weight: 600;">FR</button>
            </div>
            <div class="logo">
                <img src="images/image.png" alt="Logo">
                <p data-i18n="register.subtitle">Votre bien-être mental, notre priorité</p>
            </div>

            <div class="form-header">
                <h2 data-i18n="register.title">Créer un compte</h2>
                <p data-i18n="register.subtitle">Rejoignez notre communauté de bien-être</p>
            </div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName" data-i18n="register.firstname">Prénom</label>
                        <input type="text" id="firstName" name="firstName" placeholder="Jean"
                            data-i18n="register.firstname" required>
                    </div>

                    <div class="form-group">
                        <label for="lastName" data-i18n="register.lastname">Nom</label>
                        <input type="text" id="lastName" name="lastName" placeholder="Dupont"
                            data-i18n="register.lastname" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email" data-i18n="register.email">Adresse email</label>
                    <input type="email" id="email" name="email" placeholder="votre@email.com" data-i18n="register.email"
                        required>
                </div>

                <div class="form-group">
                    <label for="phone" data-i18n="register.phone">Numéro de téléphone</label>
                    <input type="tel" id="phone" name="phone" placeholder="+33 6 12 34 56 78" data-i18n="register.phone"
                        required>
                </div>

                <div class="form-group">
                    <label for="password" data-i18n="register.password">Mot de passe</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••"
                            data-i18n="register.password" required oninput="checkPasswordStrength()">
                        <span class="password-toggle" onclick="togglePassword('password')">👁️</span>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" data-i18n="register.confirm">Confirmer le mot de passe</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••"
                            data-i18n="register.confirm" required>
                        <span class="password-toggle" onclick="togglePassword('confirmPassword')">👁️</span>
                    </div>
                </div>

                <div class="terms-checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">
                        <span data-i18n="register.terms_accept">J'accepte les</span> <a href="#" data-i18n="nav.services">conditions
                            d'utilisation</a> <span data-i18n="register.terms_and">et la</span> <a href="#" data-i18n="nav.apropos">politique de
                            confidentialité</a>
                    </label>
                </div>

                <button type="submit" class="btn-register" data-i18n="register.submit">Créer mon compte</button>
            </form>

            <!-- Verification Section Removed -->

            <div class="login-link">
                <span data-i18n="register.has_account">Vous avez déjà un compte ?</span> <a href="login.html"
                    data-i18n="nav.login">Se connecter</a>
            </div>

            <div class="back-home">
                <a href="index.html" data-i18n="login.back_home">← Retour à l'accueil</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const toggle = passwordInput.nextElementSibling;

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggle.textContent = '👁️‍🗨️';
            } else {
                passwordInput.type = 'password';
                toggle.textContent = '👁️';
            }
        }

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('strengthBar');

            let strength = 0;

            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            strengthBar.className = 'password-strength-bar';

            if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
            } else if (strength <= 4) {
                strengthBar.classList.add('strength-medium');
            } else {
                strengthBar.classList.add('strength-strong');
            }
        }

        const API_URL = '/api';

        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showNotification('Les mots de passe ne correspondent pas !', 'error');
                return;
            }

            const email = document.getElementById('email').value;
            const formData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: email,
                phone: document.getElementById('phone').value,
                password: password
            };

            const submitBtn = document.querySelector('.btn-register');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="loading-spinner"></span> ${getNestedTranslation(currentLang, 'common.loading')}`;

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    showNotification('Inscription réussie ! Redirection...', 'success');
                    
                    // Store token and redirect
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showNotification(data.message || 'Erreur lors de l\'inscription', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Créer mon compte';
                }
            } catch (error) {
                console.error('Registration error:', error);
                showNotification('Erreur de connexion au serveur.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Créer mon compte';
            }
        });

        // OTP logic removed
    </script>
</body>

</html>
